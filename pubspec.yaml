name: tower_defense
description: Tower Defense Game with Flutter + Flame
version: 1.0.0+4

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.18.0
  audioplayers: ^6.1.0
  url_launcher: ^6.3.1
  firebase_core: ^4.5.0
  firebase_auth: ^6.2.0
  cloud_firestore: ^6.0.3
  firebase_crashlytics: ^5.0.3
  google_sign_in: ^7.2.0
  package_info_plus: ^8.3.0
  google_mobile_ads: ^5.1.0
  in_app_purchase: ^3.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/defense_app_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/data/maps/
    - assets/data/waves/
    - assets/data/towers/
    - assets/data/enemies/
    - assets/data/stages/
    - assets/data/difficulties/
    - assets/data/modes/
    - assets/data/gacha/
    - assets/data/progress/
    - assets/data/balance/
    - assets/data/lobby_upgrades/
    - assets/data/ultimate_fx.json
    - assets/images/
    - assets/images/UI/
    - assets/images/main_towers/
    - assets/images/maps/
    - assets/images/enemies/
    - assets/images/towers/
    - assets/images/towers_effect/
    - assets/images/towers_special_effect/
    - assets/images/towers_skill/
    - assets/images/enemies_effect/
    - assets/images/core/
    - assets/audio/bgm/
    - assets/audio/sfx/ui/
    - assets/audio/sfx/system/
    - assets/audio/sfx/towers/
