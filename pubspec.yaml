name: tower_defense
description: Tower Defense Game with Flutter + Flame
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flame: ^1.18.0
  shared_preferences: ^2.3.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/data/
    - assets/data/maps/
    - assets/data/waves/
    - assets/data/towers/
    - assets/data/enemies/
    - assets/data/stages/
    - assets/data/difficulties/
    - assets/data/modes/
    - assets/data/gacha/
    - assets/data/progress/
    - assets/data/balance/
    - assets/data/lobby_upgrades/
    - assets/data/ultimate_fx.json
    - assets/images/
    - assets/images/UI/
    - assets/images/main_towers/
    - assets/images/maps/
    - assets/images/enemies/
    - assets/images/towers/
    - assets/images/towers_effect/
    - assets/images/towers_special_effect/
    - assets/images/towers_skill/
    - assets/images/enemies_effect/
    - assets/images/core/
